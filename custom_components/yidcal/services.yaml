# YidCal services
#
# Services are only functional when their corresponding toggle is
# enabled in the YidCal integration options. If you don't see the
# yidcal.check_zmanim service do anything, enable "Zmanim Lookup" in
# Settings → Devices & Services → YidCal → Configure → General.

check_zmanim:
  name: Check Zmanim
  description: Look up zmanim for up to 10 dates and publish them to sensor.yidcal_zmanim_lookup.
  fields:
    date:
      name: Date
      description: Primary date. Its label becomes the sensor state.
      required: true
      example: "2026-05-22"
      selector:
        date:
    date_2:
      name: Date 2 (optional)
      description: Second date (attributes suffixed "_2").
      required: false
      example: "2026-05-23"
      selector:
        date:
    date_3:
      name: Date 3 (optional)
      description: Third date (suffix "_3").
      required: false
      example: "2026-05-30"
      selector:
        date:
    date_4:
      name: Date 4 (optional)
      description: Fourth date (suffix "_4").
      required: false
      selector:
        date:
    date_5:
      name: Date 5 (optional)
      description: Fifth date (suffix "_5").
      required: false
      selector:
        date:
    date_6:
      name: Date 6 (optional)
      description: Sixth date (suffix "_6").
      required: false
      selector:
        date:
    date_7:
      name: Date 7 (optional)
      description: Seventh date (suffix "_7").
      required: false
      selector:
        date:
    date_8:
      name: Date 8 (optional)
      description: Eighth date (suffix "_8").
      required: false
      selector:
        date:
    date_9:
      name: Date 9 (optional)
      description: Ninth date (suffix "_9").
      required: false
      selector:
        date:
    date_10:
      name: Date 10 (optional)
      description: Tenth date (suffix "_10").
      required: false
      selector:
        date:
    location:
      name: Location (optional)
      description: Zip code, place name, or "lat,lon". Defaults to the integration location.
      required: false
      example: "Lakewood, NJ"
      selector:
        text:

set_yurtzeit_muted:
  name: Set Muted Yurtzeits
  description: Mute or unmute yurtzeit names.
  fields:
    names:
      name: Names
      description: Names to mute, or a name → true/false map.
      required: true
      example:
        - 'רבי פלוני בן רבי אלמוני זי״ע [מחבר ספר דוגמא] תש״א'
      selector:
        object:

set_yurtzeit_custom:
  name: Set Custom Yurtzeits
  description: Add or replace custom yurtzeit entries.
  fields:
    entries:
      name: Entries
      description: Custom yurtzeit entries to add or replace.
      required: true
      example:
        - date: 'ט״ו תמוז'
          name: 'רבי פלוני זי״ע'
      selector:
        object:

generate_luach:
  name: Generate Luach (PDF)
  description: Generate a luach PDF — Weekly YidCal card, yearly multi-page, or yearly sheet.
  fields:
    style:
      name: Style
      description: Which luach to produce.
      required: false
      default: weekly_yidcal
      selector:
        select:
          custom_value: true
          options:
            - value: "weekly_yidcal"
              label: "Weekly YidCal (Single Card)"
            - value: "yearly_multi_page"
              label: "Yearly (Multi Sheet)"
            - value: "yearly_sheet"
              label: "Yearly (Single Sheet)"
    shehecheyanu:
      name: Shehecheyanu marker
      description: Weekly YidCal only — print שהחיינו / א״א שהחיינו under each candle box.
      required: false
      selector:
        constant:
          value: true
          label: Print the marker
    time_format:
      name: Time format
      description: 12-hour (default) or 24-hour clock.
      required: false
      example: "12"
      selector:
        select:
          options:
            - "12"
            - "24"
    hebrew_year:
      name: Hebrew year (full-year shortcut)
      description: Hebrew year — 5786 or תשפ״ו. Defaults to the current year.
      required: false
      example: "תשפ״ז"
      selector:
        text:
    start_date:
      name: Start date
      description: Range start (Weekly & Yearly Multi Sheet). Multi Sheet — pass to trim (e.g. today = rest of year).
      required: false
      example: "2026-05-08"
      selector:
        date:
    end_date:
      name: End date
      description: Range end (Weekly & Yearly Multi Sheet).
      required: false
      example: "2026-09-20"
      selector:
        date:
    location:
      name: Location (optional)
      description: Zip code, place name, or "lat,lon". Defaults to the integration location.
      required: false
      example: "Monsey, NY"
      selector:
        text:
    is_in_israel:
      name: Generate for Israel
      description: Override the integration setting. On = Israel, off = Diaspora. Leave unchecked to use it.
      required: false
      example: true
      selector:
        boolean:
    candle_offset:
      name: Candle lighting offset (minutes before sunset)
      description: Minutes before sunset for candle-lighting. Defaults to the integration value.
      required: false
      example: 15
      selector:
        number:
          min: 0
          max: 40
          unit_of_measurement: min
          mode: box
    havdalah_offset:
      name: Motzei (havdalah) offset (minutes after sunset)
      description: Minutes after sunset for havdalah. Defaults to the integration value.
      required: false
      example: 72
      selector:
        number:
          min: 30
          max: 120
          unit_of_measurement: min
          mode: box
    add_seconds:
      name: Add seconds
      description: Weekly YidCal only — Show seconds on the zmanim in Grid times.
      required: false
      selector:
        constant:
          value: true
          label: Show seconds
    output_path:
      name: Output path (optional)
      description: Where to write the PDF. Defaults to /config/www/yidcal-data/.
      required: false
      example: "my_luach.pdf"
      selector:
        text:
    emit_json:
      name: Also write a JSON data file
      description: Also write a JSON dump of the luach data.
      required: false
      selector:
        constant:
          value: true
          label: Write the JSON file
    # NOTE: the handler also accepts two params — `json_only` and
    # `include_weekly` — used ONLY by the background Erev-Rosh-Hashanah
    # JSON auto-export. They are intentionally NOT exposed as UI fields, so
    # this manual "Generate Luach (PDF)" service looks and behaves exactly
    # as it did before. (Still accepted if passed by hand via YAML.)
